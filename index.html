<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Juçaí Support Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
  /* --- Juçaí Brand Variables --- */
  :root {
    --primary-brand: #602750;       /* Juçaí Berry Purple */
    --primary-hover: #4A1D3D;
    --brand-beige: #F5F2ED;         /* Signature Organic Beige Background */
    --brand-cream: #FFFFFF;         /* Pure white for bubbles */
    --dark-text: #2C1826;           /* Deep purple-tinted text */
    --medium-text: #8E7C88;
    --border-soft: rgba(96, 39, 80, 0.1);
    --success-green: #2ECC71;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Poppins', sans-serif;
    background-color: var(--brand-beige); /* The Beige Background */
    color: var(--dark-text);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
  }

  /* --- Header --- */
  .header {
    background: var(--brand-cream);
    border-bottom: 1px solid var(--border-soft);
    padding: 15px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 10;
    box-shadow: 0 2px 15px rgba(0,0,0,0.02);
  }

  .header-left { display: flex; align-items: center; gap: 12px; }

  .logo-container {
    width: 48px;
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .header-title { font-size: 17px; font-weight: 700; color: var(--primary-brand); letter-spacing: -0.3px; }
  .header-sub { font-size: 11px; color: var(--medium-text); display: flex; align-items: center; gap: 5px; font-weight: 500; }
  
  .status-dot {
    width: 7px; height: 7px; background: var(--success-green);
    border-radius: 50%; box-shadow: 0 0 8px var(--success-green);
  }

  .restart-btn {
    background: none; border: none; color: var(--medium-text);
    cursor: pointer; padding: 8px; border-radius: 50%; transition: 0.2s;
  }
  .restart-btn:hover { background: var(--brand-beige); color: var(--primary-brand); }

  /* --- Chat Area --- */
  .chat-window {
    flex: 1; overflow-y: auto; padding: 25px 20px;
    display: flex; flex-direction: column; gap: 20px;
    background-color: var(--brand-beige);
  }

  .message-wrapper { display: flex; flex-direction: column; animation: fadeIn 0.4s ease; }
  .message-wrapper.user { align-items: flex-end; }
  .message-wrapper.bot { align-items: flex-start; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .message {
    padding: 14px 18px; border-radius: 20px; font-size: 14.5px;
    line-height: 1.6; max-width: 80%; box-shadow: 0 2px 5px rgba(0,0,0,0.03);
  }

  .message.user {
    background: var(--primary-brand); color: white;
    border-bottom-right-radius: 4px;
  }

  .message.bot {
    background: var(--brand-cream); color: var(--dark-text);
    border: 1px solid var(--border-soft);
    border-bottom-left-radius: 4px;
  }

  .bot-label {
    font-size: 10px; font-weight: 800; color: var(--primary-brand);
    text-transform: uppercase; margin-bottom: 6px; display: flex; align-items: center; gap: 4px;
  }

  .message-time { font-size: 10px; color: var(--medium-text); margin-top: 5px; padding: 0 5px; }

  /* --- Input Area --- */
  .footer-container {
    background: var(--brand-cream);
    padding: 15px 20px 25px 20px;
    border-top: 1px solid var(--border-soft);
  }

  .quick-replies { display: flex; gap: 8px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
  .qr-btn {
    background: transparent; border: 1.5px solid var(--primary-brand);
    color: var(--primary-brand); padding: 7px 15px; border-radius: 25px;
    font-size: 12px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: 0.2s;
  }
  .qr-btn:hover { background: var(--primary-brand); color: white; }

  .input-wrapper { display: flex; align-items: center; gap: 12px; position: relative; }
  
  .input-wrapper input {
    flex: 1; padding: 14px 60px 14px 20px; border-radius: 30px;
    border: 1px solid var(--border-soft); background: var(--brand-beige);
    outline: none; font-family: inherit; font-size: 14px; color: var(--dark-text);
    transition: 0.3s;
  }
  .input-wrapper input:focus { border-color: var(--primary-brand); background: white; box-shadow: 0 0 0 4px rgba(96, 39, 80, 0.05); }

  /* LEAF SEND BUTTON */
  .send-leaf-btn {
    position: absolute; right: 6px;
    background: var(--primary-brand); color: white;
    border: none; width: 42px; height: 42px;
    border-radius: 50%; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }
  .send-leaf-btn:hover { transform: scale(1.1) rotate(-10deg); background: var(--primary-hover); }
  .send-leaf-btn svg { fill: white; width: 22px; height: 22px; }

  .powered-by { text-align: center; font-size: 9px; color: var(--medium-text); margin-top: 15px; letter-spacing: 1.5px; font-weight: 600; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo-container">
      <svg version="1.1" viewBox="0 0 252.3 252.3" xmlns="http://www.w3.org/2000/svg" style="width: 100%; height: 100%;">
        <g>
          <path fill="#602750" d="M126.1,252.3c-33.7,0-65.4-13.1-89.2-36.9C13.1,191.5,0,159.8,0,126.1c0-33.7,13.1-65.4,36.9-89.2 C60.8,13.1,92.4,0,126.1,0c33.7,0,65.4,13.1,89.2,36.9c23.8,23.8,36.9,55.5,36.9,89.2c0,33.7-13.1,65.4-36.9,89.2 C191.5,239.2,159.8,252.3,126.1,252.3z"/>
          <path fill="#FFFFFF" d="M169.3,107.8c-4.4,5.5-6.8,14.6-11.3,21.2c-2.9,4.2-6.7,7.4-12.4,8c-8.4,0-15.2-6.8-15.2-15.2 c0-8.4,6.8-15.2,15.2-15.2c3.5,0,6.8,1.2,9.5,3.3l6.2-8.9c-4.5-3.4-10-5.3-15.7-5.3c-14.3,0-26,11.7-26,26c0,13.2,9.8,24,22.5,25.8 l2.4,0.2l-3.8,8.9c0,0,22.4-5.9,27.9-23.1c4.1,8.2,12.6,13.8,22.3,13.8c6.3,0,12-2.3,16.4-6.1c1.2,1,4.9,4,8.7,4.8V97.3 c-0.3,0-25,0-25,0C181.5,97.3,174,101.2,169.3,107.8z M203.8,108.2v14.2c0,7.8-6.4,14.1-14.2,14.1s-14.2-6.3-14.2-14.2 s6.4-14.2,14.2-14.2c0.2,0,0.4,0,0.5,0H203.8z"/>
          <path fill="#FFFFFF" d="M101.4,123.1c0,7.6-6.2,13.8-13.8,13.8c-7.6,0-13.8-6.2-13.8-13.8V97.2H63.1v25.9 c0,13.5,11,24.4,24.5,24.4c6.4,0,12.2-2,16.5-6c1.6,1.7,5.4,4.2,7.9,4.6v-0.4V97.2h-10.6V123.1z"/>
          <rect x="222.6" y="97.2" fill="#FFFFFF" width="10.6" height="49"/>
          <polygon fill="#FFFFFF" points="222.6,82.1 236.8,82.1 222.7,93.2"/>
          <path fill="#FFFFFF" d="M55,82.3l-19.7,0L44,97.1l0,49.5c0,6.6-5.4,12-12,12s-12-5.4-12-12c0-4,2-7.5,4.9-9.7 l10.4-7.6v-13.7L19.2,127.5c-6.2,4.1-10.2,11.1-10.2,19.1c0,12.7,10.3,23,23,23c12.6,0,22.8-10.1,23-22.7L55,82.3z"/>
        </g>
      </svg>
    </div>
    <div class="header-text">
      <div class="header-title">Juçaí Support</div>
      <div class="header-sub"><span class="status-dot"></span> Online | Expert Assistant</div>
    </div>
  </div>
  <button class="restart-btn" id="restart-btn" title="Clear Chat">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
  </button>
</div>

<div class="chat-window" id="chat"></div>

<div class="footer-container">
  <div class="quick-replies" id="quick-replies"></div>
  <div class="input-wrapper">
    <input type="text" id="input" placeholder="Type your message..." autocomplete="off">
    <button class="send-leaf-btn" id="send-btn">
      <svg viewBox="0 0 24 24"><path d="M17,8C15.52,8 14.15,8.6 13.13,9.57C15.07,9.1 17,9.63 18.23,10.86C20.18,12.81 20.18,15.97 18.23,17.92C16.28,19.87 13.12,19.87 11.17,17.92C9.94,16.69 9.41,14.76 9.88,12.82C8.91,13.85 8.31,15.21 8.31,16.69C8.31,19.62 10.69,22 13.62,22C14.88,22 16.03,21.56 16.94,20.81L19,22.88L20.41,21.47L18.34,19.4C19.38,18.17 20,16.59 20,14.84C20,11.06 16.94,8 13.16,8H17V8Z M11,2H7L12.06,7.06C9.03,8.08 7,10.92 7,14.24C7,14.83 7.06,15.41 7.18,15.97L2,10.78V10.78V2H11Z"/></svg>
    </button>
  </div>
  <div class="powered-by">POWERED BY SQU</div>
</div>

<script>
const CONFIG = {
  bot: "Juçaí Assistant",
  webhook: "https://n8n.srv1208833.hstgr.cloud/webhook/jucai-chat",
  welcome: "Hello! I'm your Juçaí expert. Whether you want to know about our organic ingredients or our mission to protect the Atlantic Forest, I'm here to help!",
  questions: ["Our Ingredients", "Is it 100% Organic?", "Sustainability Mission", "Find Store"]
};

let chatId = 'web_' + Math.random().toString(36).substr(2, 9);
const chat = document.getElementById('chat');
const input = document.getElementById('input');

function addMsg(text, type) {
  const wrapper = document.createElement('div');
  wrapper.className = `message-wrapper ${type}`;
  const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  
  wrapper.innerHTML = `
    ${type === 'bot' ? `<div class="bot-label"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M11 20A7 7 0 0 1 9.8 6.1C15.5 5 17 4.48 19 2c1 2 2 4.18 2 8a7 7 0 0 1-7 7c-1.18 0-2.34-.38-3.39-1.02L11 20z"></path></svg>${CONFIG.bot}</div>` : ''}
    <div class="message ${type}">${text}</div>
    <div class="message-time">${time}</div>
  `;
  chat.appendChild(wrapper);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const div = document.createElement('div');
  div.id = 'typing';
  div.className = 'message-wrapper bot';
  div.innerHTML = `<div class="message bot" style="display:flex; gap:4px; padding:12px 18px;"><span style="width:6px; height:6px; background:#602750; border-radius:50%; animation:bounce 1.4s infinite ease-in-out"></span><span style="width:6px; height:6px; background:#602750; border-radius:50%; animation:bounce 1.4s infinite ease-in-out; animation-delay:0.2s"></span><span style="width:6px; height:6px; background:#602750; border-radius:50%; animation:bounce 1.4s infinite ease-in-out; animation-delay:0.4s"></span></div>`;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

async function handleSend(textOverride) {
  const text = textOverride || input.value.trim();
  if (!text) return;
  input.value = '';
  document.getElementById('quick-replies').style.display = 'none';
  
  addMsg(text, 'user');
  showTyping();

  try {
    const res = await fetch(CONFIG.webhook, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, chatId })
    });
    const data = await res.json();
    document.getElementById('typing').remove();
    addMsg(data.reply || "I'm having a little trouble connecting. Please try again in a moment!", 'bot');
  } catch(e) {
    if(document.getElementById('typing')) document.getElementById('typing').remove();
    addMsg("I couldn't reach the server. Please check your connection.", 'bot');
  }
}

function init() {
  chat.innerHTML = '';
  addMsg(CONFIG.welcome, 'bot');
  const qr = document.getElementById('quick-replies');
  qr.innerHTML = '';
  qr.style.display = 'flex';
  CONFIG.questions.forEach(q => {
    const b = document.createElement('button');
    b.className = 'qr-btn';
    b.textContent = q;
    b.onclick = () => handleSend(q);
    qr.appendChild(b);
  });
}

document.getElementById('send-btn').onclick = () => handleSend();
input.onkeypress = e => { if(e.key === 'Enter') handleSend(); };
document.getElementById('restart-btn').onclick = () => { chatId = 'web_' + Math.random().toString(36).substr(2, 9); init(); };

init();
</script>

<style>
@keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
</style>

</body>
</html>
